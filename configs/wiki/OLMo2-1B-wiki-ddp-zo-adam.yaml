# Тот же OLMo2-1B и данные, что OLMo2-1B-wiki-1gpu-lozo.yaml, но оптимизатор ZoAdam (zero-order + Adam-моменты)
# и обучение через DDP (не FSDP — ZoAdam с FSDP не поддерживается).
#
# Запуск (подставьте число GPU):
#   uv run torchrun --nproc_per_node=2 scripts/train.py configs/wiki/OLMo2-1B-wiki-ddp-zo-adam.yaml
#
# global_train_batch_size должен без остатка делиться на (число процессов × узел).
# Сейчас 512 — подходит для 1, 2, 4, 8, … GPU на узле. Для 3 GPU возьмите, например, 510 или 480.
# device_train_batch_size = global_train_batch_size // nproc; микробатч должен его делить.
#
# Один шаг ZoAdam ≈ 2–3 полных прохода по микробатчам (как MeZO), плюс обновление моментов.
#
# Память: при OOM уменьшайте global_train_batch_size и/или device_train_microbatch_size.
#
# IPv6 / localhost:
#   export MASTER_ADDR=127.0.0.1

run_name: OLMo2-1B-wiki-ddp-zo-adam
seed: 6198
dry_run: false

wandb:
  name: ${run_name}
  project: olmo-wiki
  group: ${run_name}
  entity: null

model:
  d_model: 2048
  n_heads: 16
  n_layers: 16
  mlp_ratio: 8
  weight_tying: false
  alibi: false
  rope: true
  rope_theta: 500000

  flash_attention: true
  attention_dropout: 0.0
  include_bias: false
  block_type: sequential
  layer_norm_type: rms
  layer_norm_with_affine: true
  layer_norm_eps: 1e-6
  bias_for_layer_norm: false
  attention_layer_norm: true
  attention_layer_norm_with_affine: true
  norm_after: true
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 1024
  vocab_size: 100278
  embedding_size: 100352
  eos_token_id: 100257
  pad_token_id: 100277
  # DDP: веса на CUDA при создании модели (см. scripts/train.py).
  init_device: cuda
  init_fn: normal
  init_std: 0.02
  init_cutoff_factor: 3

softmax_auxiliary_loss: true
auxiliary_loss_multiplier: 1e-5
fused_loss: false

compile: null

optimizer:
  name: zo_adam
  learning_rate: 1.0e-4
  weight_decay: 0.1
  eps: 1e-8
  decay_norm_and_bias: true
  decay_embeddings: false
  betas:
    - 0.9
    - 0.95
  metrics_log_interval: 1
  zo_eps: 1.0e-3
  zo_perturbation_mode: two_side
  mezo_vector_sampling_type: standard_normal

scheduler:
  name: cosine_with_warmup
  units: tokens
  t_warmup: 62000000
  t_max: 1247322704
  alpha_f: 0.1
  warmup_min_lr: 0.0

tokenizer:
  identifier: tokenizers/allenai_dolma2.json
  truncate_direction: right

save_folder: ./runs/OLMo2-1B-wiki-ddp-zo-adam
save_overwrite: false

save_interval: 1000
save_interval_ephemeral: 1000
save_num_checkpoints_to_keep: 2
save_interval_unsharded: 1000
save_num_unsharded_checkpoints_to_keep: 2

load_path: null

global_train_batch_size: 512
device_train_microbatch_size: 4

max_duration: 1247322704T

precision: amp_bf16

distributed_strategy: ddp

ddp:
  grad_sync_mode: batch
  find_unused_params: false

max_grad_norm: 1.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 1

gen1_gc_interval: 10

eval_interval: 1000
eval_subset_num_batches: -1
device_eval_batch_size: ${device_train_microbatch_size}

evaluators:
  - label: dolma_wiki-validation
    type: lm
    data:
      pad_direction: right
      num_workers: 4
      drop_last: true
      pin_memory: true
      prefetch_factor: 2
      persistent_workers: true
      memmap_dtype: uint32
      paths:
        - /home/gur_andry/data/wikitext/validation/0_00000.npy

data:
  pad_direction: right
  num_workers: 8
  drop_last: true
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  memmap_dtype: uint32
  timeout: 0
  instance_filter:
    repetition_max_period: 13
    repetition_min_period: 1
    repetition_max_count: 32
  paths:
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00000.npy
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00001.npy
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00002.npy
