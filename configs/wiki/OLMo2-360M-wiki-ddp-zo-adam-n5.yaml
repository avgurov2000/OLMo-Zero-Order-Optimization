# OLMo2 ~360M (d_model=1024, 16 слоёв), Wikipedia, ZoAdam с 5 антитетическими парами, DDP 2 GPU.
#
# Параметры модели:
#   d_model=1024, n_layers=16, n_heads=8, mlp_ratio=8 → ~470M (включая эмбеддинги)
#   Без эмбеддингов (тело) → ~268M.  Наименование «360M» — номинальный класс модели.
#
# ZoAdam (num_pert_samples=5):
#   Каждый шаг = 10 forward-проходов (5 пар ±εzᵢ), никакого backward.
#   Градиент-оценка: g = (1/5) · Σᵢ scalar_i · zᵢ, затем один шаг Adam.
#   Overhead vs n=1: ×5 по времени шага, памяти не прибавляется
#     (моменты уже хранятся для всех параметров, доп. форварды ~inference_mode).
#
# Память (2×A100 40GB):
#   Модель bf16:      ~0.9 GB / GPU
#   Adam state fp32:  ~1.8 GB / GPU (2 момента)
#   Активации:        ~0.5 GB / GPU (batch=4, seq=1024, ×10 форвардов последовательно)
#   Итого:            ~3.5 GB / GPU — очень комфортно.
#
# Запуск (2 GPU):
#   uv run torchrun --nproc_per_node=2 scripts/train.py \
#       configs/wiki/OLMo2-360M-wiki-ddp-zo-adam-n5.yaml
#
# IPv6 / localhost:
#   export MASTER_ADDR=127.0.0.1

run_name: OLMo2-360M-wiki-ddp-zo-adam-n5
seed: 6198
dry_run: false

wandb:
  name: ${run_name}
  project: olmo-wiki
  group: ${run_name}
  entity: null

model:
  d_model: 896
  n_heads: 14
  n_layers: 16
  mlp_ratio: 8
  weight_tying: false
  alibi: false
  rope: true
  rope_theta: 500000
  flash_attention: true
  attention_dropout: 0.0
  include_bias: false
  block_type: sequential
  layer_norm_type: rms
  layer_norm_with_affine: true
  layer_norm_eps: 1e-6
  bias_for_layer_norm: false
  attention_layer_norm: true
  attention_layer_norm_with_affine: true
  norm_after: true
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 1024
  vocab_size: 100278
  embedding_size: 100352
  eos_token_id: 100257
  pad_token_id: 100277
  init_device: cuda
  init_fn: normal
  init_std: 0.02
  init_cutoff_factor: 3

softmax_auxiliary_loss: true
auxiliary_loss_multiplier: 1e-5
fused_loss: false

compile: null

optimizer:
  name: zo_adam
  learning_rate: 1.0e-4
  weight_decay: 0.1
  eps: 1e-8
  decay_norm_and_bias: true
  decay_embeddings: false
  betas:
    - 0.9
    - 0.95
  metrics_log_interval: 1
  zo_eps: 1.0e-3
  zo_perturbation_mode: two_side
  mezo_vector_sampling_type: standard_normal
  mezo_num_pert_samples: 5   # 5 антитетических пар → 10 forward-проходов на шаг

scheduler:
  name: cosine_with_warmup
  units: tokens
  t_warmup: 62000000
  t_max: 1247322704
  alpha_f: 0.1
  warmup_min_lr: 0.0

tokenizer:
  identifier: tokenizers/allenai_dolma2.json
  truncate_direction: right

save_folder: ./runs/OLMo2-360M-wiki-ddp-zo-adam-n5
save_overwrite: false

save_interval: 1000
save_interval_ephemeral: 1000
save_num_checkpoints_to_keep: 2
save_interval_unsharded: 1000
save_num_unsharded_checkpoints_to_keep: 2

load_path: null

global_train_batch_size: 512
device_train_microbatch_size: 4

max_duration: 1247322704T

precision: amp_bf16

distributed_strategy: ddp

ddp:
  grad_sync_mode: batch
  find_unused_params: false

max_grad_norm: 1.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 1

gen1_gc_interval: 10

eval_interval: 1000
eval_subset_num_batches: -1
device_eval_batch_size: ${device_train_microbatch_size}

evaluators:
  - label: dolma_wiki-validation
    type: lm
    data:
      pad_direction: right
      num_workers: 4
      drop_last: true
      pin_memory: true
      prefetch_factor: 2
      persistent_workers: true
      memmap_dtype: uint32
      paths:
        - /home/gur_andry/data/wikitext/validation/0_00000.npy

data:
  pad_direction: right
  num_workers: 8
  drop_last: true
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  memmap_dtype: uint32
  timeout: 0
  instance_filter:
    repetition_max_period: 13
    repetition_min_period: 1
    repetition_max_count: 32
  paths:
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00000.npy
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00001.npy
    - /home/gur_andry/data/olmo-wiki/train/wiki-0001/0_00002.npy
    - /home/gur_andry/data/olmo-wiki/train/wiki-0000/0_00000.npy
